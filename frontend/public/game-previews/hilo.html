<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: radial-gradient(ellipse at 50% 80%, #1a1c22 0%, #0a0b0e 65%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .scene { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; gap: 28px; }

  .felt {
    position: absolute;
    width: 560px; height: 270px; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 40%, #2d6b4e 0%, #1a3d2e 100%);
    border: 3px solid rgba(229,179,76,0.18);
    box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.3);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  .card {
    position: relative; z-index: 2;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.4);
  }
  .card-face {
    width: 118px; height: 170px;
    background: #f8f6f0;
    border-radius: 12px;
    padding: 10px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-face.red { color: #c0392b; }
  .card-face.black { color: #111; }
  .rank-top { font-size: 20px; font-weight: 900; line-height: 1; }
  .suit-center { font-size: 56px; line-height: 1; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
  .rank-bot { font-size: 20px; font-weight: 900; line-height: 1; text-align: right; transform: rotate(180deg); }

  /* Face-down card */
  .card-back {
    width: 118px; height: 170px;
    background: linear-gradient(135deg, #1a2a5e 0%, #0d1a40 100%);
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card-back::before {
    content: '';
    position: absolute; inset: 6px;
    border: 1.5px solid rgba(229,179,76,0.35);
    border-radius: 8px;
  }
  .card-back-pattern {
    width: 50px; height: 50px;
    color: rgba(229,179,76,0.3);
    font-size: 40px;
    font-weight: 900;
  }

  /* Arrow between cards */
  .arrow {
    position: relative; z-index: 3;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .arrow-btn {
    background: rgba(229,179,76,0.12); border: 1px solid rgba(229,179,76,0.4);
    border-radius: 999px; padding: 6px 18px;
    color: #e5b34c; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em;
  }
  .arrow-btn.green {
    background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.4);
    color: #4ade80;
  }
  .arrow-sep { color: rgba(255,255,255,0.15); font-size: 11px; letter-spacing: 0.1em; }

  /* Streak badge */
  .streak {
    position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
    background: rgba(229,179,76,0.15); border: 1px solid rgba(229,179,76,0.35);
    border-radius: 999px; padding: 4px 16px;
    color: #e5b34c; font-size: 13px; font-weight: 700;
    white-space: nowrap;
  }
  .title {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(246,243,236,0.5); font-size: 13px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  /* bankroll */
  .bankroll {
    position: absolute; top: 36px; right: 60px;
    color: rgba(246,243,236,0.6); font-size: 13px; font-weight: 600;
  }
  .bankroll span { color: #4ade80; font-size: 20px; font-weight: 800; }
</style>
</head>
<body>
<div class="scene">
  <div class="felt"></div>

  <div class="card">
    <div class="card-face black">
      <div class="rank-top">K<br>♠</div>
      <div class="suit-center">♠</div>
      <div class="rank-bot">K<br>♠</div>
    </div>
  </div>

  <div class="arrow">
    <div class="arrow-btn green">▲ Higher</div>
    <div class="arrow-sep">or</div>
    <div class="arrow-btn">▼ Lower</div>
  </div>

  <div class="card" style="transform: rotate(1.5deg)">
    <div class="card-back">
      <div class="card-back-pattern">?</div>
    </div>
  </div>

  <div class="streak">🔥 Streak: 4</div>
  <span class="title">Hi-Lo</span>
  <div class="bankroll">Balance <span>$1,400</span></div>
</div>
</body>
</html>
