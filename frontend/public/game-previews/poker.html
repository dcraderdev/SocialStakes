<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: #0a0a0d;
    font-family: -apple-system, system-ui, sans-serif;
  }
  /* Full felt oval table */
  .table {
    position: absolute;
    width: 720px; height: 340px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 40%, #307055 0%, #1e5040 50%, #0e2820 100%);
    border: 14px solid #5c3d10;
    box-shadow:
      0 0 0 3px rgba(229,179,76,0.4),
      0 0 0 5px #3a2008,
      0 0 60px rgba(0,0,0,0.8),
      inset 0 0 60px rgba(0,0,0,0.35);
  }
  .table::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(0,0,0,0.05)'/%3E%3C/svg%3E") repeat;
  }

  /* ── Cards ── */
  .card {
    background: #f8f6f0; border-radius: 7px;
    box-shadow: 0 5px 16px rgba(0,0,0,0.65);
    display: inline-flex; flex-direction: column; justify-content: space-between;
    padding: 6px; font-weight: 900;
  }
  .card.red { color: #c0392b; }
  .card.black { color: #111; }
  .card-sm { width: 58px; height: 84px; font-size: 13px; }
  .card-hole { width: 50px; height: 72px; font-size: 12px; }
  .suit-big { text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
  .suit-big-sm { font-size: 28px; }
  .suit-big-xs { font-size: 24px; }
  .rank-bot { text-align: right; transform: rotate(180deg); line-height: 1; }

  /* Community cards — center of table */
  .community {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; gap: 8px; align-items: center;
  }

  /* Pot */
  .pot {
    position: absolute; top: calc(50% - 62px); left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .chip-row { display: flex; gap: 3px; }
  .chip { width: 32px; height: 8px; border-radius: 50%; margin-bottom: -2px; }
  .cg { background: radial-gradient(ellipse, #e5b34c, #9a7010); border: 1px solid #c99020; }
  .cr { background: radial-gradient(ellipse, #e05555, #8b2020); border: 1px solid #c04040; }
  .cb { background: radial-gradient(ellipse, #4a90d9, #1a4a8b); border: 1px solid #3070b9; }
  .cw { background: radial-gradient(ellipse, #ddd, #999); border: 1px solid #bbb; }
  .pot-label { margin-top: 5px; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; }

  /* Player hole cards — bottom center */
  .hole-area {
    position: absolute; bottom: 38px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .hole-cards { display: flex; gap: 6px; }
  .you-label {
    color: rgba(255,255,255,0.55); font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
  }

  /* Opponent hole cards face-down — top */
  .opp-top {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .card-back {
    width: 50px; height: 72px; border-radius: 7px;
    background: linear-gradient(135deg, #1e3a7a, #0d2050);
    box-shadow: 0 5px 14px rgba(0,0,0,0.7);
    position: relative; overflow: hidden;
  }
  .card-back::before {
    content: ''; position: absolute; inset: 4px;
    border: 1px solid rgba(229,179,76,0.28); border-radius: 4px;
  }
  .opp-cards { display: flex; gap: 4px; }

  /* Side opponents */
  .opp-left {
    position: absolute; top: 50%; left: 36px; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .opp-right {
    position: absolute; top: 50%; right: 36px; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .opp-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; color: rgba(0,0,0,0.6);
  }
  .av-g  { background: #74d5a0; }
  .av-pk { background: #f4a8c6; }
  .av-y  { background: #f6c553; }
  .av-pu { background: #b58cf2; }

  /* Action badge */
  .action-badge {
    position: absolute; bottom: 118px; left: 50%; transform: translateX(-50%);
    background: rgba(229,179,76,0.15); border: 1px solid rgba(229,179,76,0.4);
    border-radius: 999px; padding: 4px 16px;
    color: #e5b34c; font-size: 13px; font-weight: 700; white-space: nowrap;
  }
</style>
</head>
<body>

<div class="table"></div>

<!-- Top opponent -->
<div class="opp-top">
  <div class="opp-cards">
    <div class="card-back"></div>
    <div class="card-back"></div>
  </div>
  <div class="opp-avatar av-pk" style="width:24px;height:24px;font-size:9px">PI</div>
</div>

<!-- Left opponent -->
<div class="opp-left">
  <div class="opp-cards">
    <div class="card-back" style="width:44px;height:64px"></div>
    <div class="card-back" style="width:44px;height:64px;margin-left:-8px"></div>
  </div>
  <div class="opp-avatar av-y">OA</div>
</div>

<!-- Right opponent -->
<div class="opp-right">
  <div class="opp-cards">
    <div class="card-back" style="width:44px;height:64px"></div>
    <div class="card-back" style="width:44px;height:64px;margin-left:-8px"></div>
  </div>
  <div class="opp-avatar av-pu">WI</div>
</div>

<!-- Pot -->
<div class="pot">
  <div class="chip-row">
    <div class="chip cg"></div><div class="chip cg"></div><div class="chip cg"></div><div class="chip cg"></div>
  </div>
  <div class="chip-row">
    <div class="chip cr"></div><div class="chip cr"></div><div class="chip cr"></div>
  </div>
  <div class="chip-row">
    <div class="chip cb"></div><div class="chip cb"></div>
  </div>
  <div class="pot-label">Pot $1,240</div>
</div>

<!-- Community cards (flop + turn + river) -->
<div class="community">
  <div class="card card-sm black">
    <div style="font-size:13px;font-weight:900;line-height:1">A♠</div>
    <div class="suit-big suit-big-sm">♠</div>
    <div class="rank-bot" style="font-size:13px">A♠</div>
  </div>
  <div class="card card-sm red">
    <div style="font-size:13px;font-weight:900;line-height:1">K♥</div>
    <div class="suit-big suit-big-sm">♥</div>
    <div class="rank-bot" style="font-size:13px">K♥</div>
  </div>
  <div class="card card-sm red">
    <div style="font-size:13px;font-weight:900;line-height:1">7♦</div>
    <div class="suit-big suit-big-sm">♦</div>
    <div class="rank-bot" style="font-size:13px">7♦</div>
  </div>
  <div class="card card-sm black">
    <div style="font-size:13px;font-weight:900;line-height:1">2♣</div>
    <div class="suit-big suit-big-sm">♣</div>
    <div class="rank-bot" style="font-size:13px">2♣</div>
  </div>
  <!-- River face-down -->
  <div class="card-back" style="width:58px;height:84px;border-radius:7px">
    <div style="position:absolute;inset:5px;border:1px solid rgba(229,179,76,0.28);border-radius:4px"></div>
  </div>
</div>

<!-- Action badge -->
<div class="action-badge">Your turn · Bet or Raise</div>

<!-- Your hole cards -->
<div class="hole-area">
  <div class="hole-cards">
    <div class="card card-hole black">
      <div style="font-size:12px;font-weight:900;line-height:1">A♣</div>
      <div class="suit-big suit-big-xs">♣</div>
      <div class="rank-bot" style="font-size:12px">A♣</div>
    </div>
    <div class="card card-hole red">
      <div style="font-size:12px;font-weight:900;line-height:1">K♦</div>
      <div class="suit-big suit-big-xs">♦</div>
      <div class="rank-bot" style="font-size:12px">K♦</div>
    </div>
  </div>
  <div class="you-label">You · Two pair A's &amp; K's</div>
</div>

</body>
</html>
